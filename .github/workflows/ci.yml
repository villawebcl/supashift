name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Tidy check
        run: go mod tidy && git diff --exit-code
      - name: Format check
        run: |
          gofmt -w ./cmd ./internal
          git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o supashift ./cmd/supashift
